<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Zig Website</title>
        <style>
            body {{
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                margin: 0;
                padding: 2rem;
                line-height: 1.5;
                background: #fafafa;
                color: #222;
            }}
            main {{
                max-width: 600px;
                margin: 0 auto;
            }}
            h1 {{
                margin-bottom: 0.5rem;
            }}
            .meta {{
                color: #666;
                font-size: 0.9rem;
            }}
            a {{
                color: inherit;
                text-decoration: underline;
            }}
            a:hover {{
                text-decoration: none;
            }}
        </style>
    </head>
    <body>
        <main>
            <h1>Hello from Zig!</h1>
            <p class="meta">Visits: {d}</p>
            <p>
                <a href="/todo">Visit todo page</a>
            </p>
        </main>
    </body>
</html>
